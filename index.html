<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanishka – Blood Group Directory</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:     #C0392B;
    --red-lt:  #F9EBEA;
    --red-mid: #E74C3C;
    --ink:     #1A1A2E;
    --muted:   #6B7280;
    --border:  #E5E7EB;
    --bg:      #F8F9FA;
    --white:   #FFFFFF;
    --radius:  10px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--red);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .drop-icon {
    width: 30px; height: 30px;
    background: var(--white);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .drop-icon svg { width: 16px; height: 16px; }
  header h1 {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.95rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 0;
    line-height: 1.3;
  }
  header p {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.75);
    margin-top: 2px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* FILTER BAR */
  .filter-section {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .filter-label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    white-space: nowrap;
  }
  .radio-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .radio-group input[type="radio"] { display: none; }
  .radio-group label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px; height: 36px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
    background: var(--white);
    user-select: none;
  }
  .radio-group label:hover {
    border-color: var(--red-mid);
    color: var(--red);
    background: var(--red-lt);
  }
  .radio-group input[type="radio"]:checked + label {
    background: var(--red);
    border-color: var(--red);
    color: var(--white);
    box-shadow: 0 2px 8px rgba(192,57,43,0.3);
  }
  .btn-reset {
    margin-left: auto;
    padding: 8px 20px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .btn-reset:hover {
    border-color: var(--red-mid);
    color: var(--red);
  }

  /* STATS BAR */
  .stats-bar {
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stats-bar span {
    font-size: 0.82rem;
    color: var(--muted);
  }
  .stats-bar strong {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--ink);
  }
  .active-filter-badge {
    display: none;
    background: var(--red-lt);
    color: var(--red);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(192,57,43,0.2);
  }

  /* TABLE */
  .table-wrap {
    padding: 0 32px 40px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  thead tr {
    background: var(--ink);
  }
  thead th {
    padding: 14px 20px;
    text-align: left;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.7);
  }
  thead th:last-child { text-align: center; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--red-lt); }
  tbody td {
    padding: 13px 20px;
    font-size: 0.88rem;
  }
  .sl { color: var(--muted); font-size: 0.78rem; width: 48px; }
  .name-cell { font-weight: 500; }
  .bg-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 48px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .bg-pos { background: #FEF3C7; color: #92400E; }
  .bg-neg { background: #DBEAFE; color: #1E40AF; }
  .bg-special { background: #F3E8FF; color: #6B21A8; }
  .bg-unknown { background: #F3F4F6; color: #9CA3AF; }

  td:last-child { text-align: center; }

  /* EMPTY STATE */
  .empty-state {
    display: none;
    text-align: center;
    padding: 60px 32px;
  }
  .empty-state .big { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { color: var(--muted); font-size: 0.9rem; }

  @media (max-width: 600px) {
    header { padding: 20px 16px; }
    .filter-section { padding: 16px; gap: 12px; }
    .table-wrap { padding: 0 16px 32px; }
    .stats-bar { padding: 12px 16px; }
    .btn-reset { margin-left: 0; }
    .radio-group label { width: 46px; height: 34px; font-size: 0.78rem; }
  }
</style>
</head>

function badgeClass(bg) {
  if (bg === "—") return "bg-unknown";
  if (bg.includes("Bombay")) return "bg-special";
  if (bg.includes("−")) return "bg-neg";
  return "bg-pos";
}

function normalise(bg) {
  // map "A-" style to "A−" (minus vs en-dash) for comparison
  return bg.replace(/-/g, "−");
}

function render(filter) {
  const tbody = document.getElementById("tableBody");
  const empty = document.getElementById("emptyState");
  const table = document.getElementById("mainTable");
  const badge = document.getElementById("filterBadge");
  const count = document.getElementById("countDisplay");

  const list = filter
    ? members.filter(m => normalise(m.bg) === filter || m.bg === filter)
    : members;

  tbody.innerHTML = "";

  if (list.length === 0) {
    table.style.display = "none";
    empty.style.display = "block";
    count.textContent = "0";
    badge.style.display = "inline";
    badge.textContent = filter;
  } else {
    table.style.display = "table";
    empty.style.display = "none";
    count.textContent = list.length;
    if (filter) {
      badge.style.display = "inline";
      badge.textContent = filter;
    } else {
      badge.style.display = "none";
    }

    list.forEach((m, i) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="sl">${i + 1}</td>
        <td class="name-cell">${m.name}</td>
        <td><span class="bg-badge ${badgeClass(m.bg)}">${m.bg}</span></td>
      `;
      tbody.appendChild(tr);
    });
  }
}

// Init
render(null);

// Filter on radio change
document.getElementById("bgFilter").addEventListener("change", e => {
  render(e.target.value);
});

// Reset
document.getElementById("resetBtn").addEventListener("click", () => {
  document.querySelectorAll('input[name="bg"]').forEach(r => r.checked = false);

});
